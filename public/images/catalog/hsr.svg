<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" fill="none">
  <rect width="800" height="500" fill="#0a0a0a"/>
  <line x1="0" y1="125" x2="800" y2="125" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="250" x2="800" y2="250" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="375" x2="800" y2="375" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="200" y1="0" x2="200" y2="500" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="500" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="500" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <!-- Center axis -->
  <line x1="55" y1="250" x2="745" y2="250" stroke="rgba(255,255,255,0.06)" stroke-width="1" stroke-dasharray="8 4"/>
  <!-- Square drive end (left) -->
  <rect x="65" y="222" width="50" height="56" fill="#1e1e1e" stroke="rgba(255,255,255,0.16)" stroke-width="1.5"/>
  <!-- Square drive cross-hatching -->
  <line x1="65" y1="222" x2="115" y2="278" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <line x1="115" y1="222" x2="65" y2="278" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="90" y="300" font-family="monospace" font-size="8" fill="rgba(59,130,246,0.6)" text-anchor="middle">SQUARE</text>
  <text x="90" y="311" font-family="monospace" font-size="8" fill="rgba(59,130,246,0.6)" text-anchor="middle">DRIVE</text>
  <!-- Main shank body -->
  <rect x="115" y="228" width="290" height="44" fill="#161616" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <!-- Lead taper -->
  <path d="M 405 228 L 440 233 L 440 267 L 405 272 Z" fill="#181818" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <!-- Cutting section with spiral flutes -->
  <rect x="440" y="233" width="265" height="34" fill="#1a1a1a" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <!-- Taper chamfer at tip -->
  <path d="M 705 233 L 722 250 L 705 267 Z" fill="#1c1c1c" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <!-- Spiral flute lines (steeper angle for spiral) -->
  <line x1="455" y1="233" x2="490" y2="267" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="492" y1="233" x2="527" y2="267" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="529" y1="233" x2="564" y2="267" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="566" y1="233" x2="601" y2="267" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="603" y1="233" x2="638" y2="267" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="638" y1="234" x2="668" y2="266" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="668" y1="236" x2="695" y2="264" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <!-- Diameter dimension -->
  <line x1="270" y1="208" x2="270" y2="228" stroke="#3b82f6" stroke-width="1"/>
  <line x1="270" y1="272" x2="270" y2="292" stroke="#3b82f6" stroke-width="1"/>
  <line x1="270" y1="211" x2="270" y2="289" stroke="#3b82f6" stroke-width="1"/>
  <polygon points="267,229 270,217 273,229" fill="#3b82f6"/>
  <polygon points="267,271 270,283 273,271" fill="#3b82f6"/>
  <text x="230" y="254" font-family="monospace" font-size="11" fill="#3b82f6" text-anchor="middle">Ø 20.000</text>
  <!-- Material callout -->
  <rect x="310" y="136" width="200" height="44" rx="2" fill="#0a0a0a" stroke="rgba(59,130,246,0.25)" stroke-width="1"/>
  <text x="410" y="153" font-family="monospace" font-size="10" fill="rgba(59,130,246,0.7)" text-anchor="middle">MATERIAL</text>
  <text x="410" y="171" font-family="monospace" font-size="13" fill="#3b82f6" text-anchor="middle" font-weight="bold">M35 Co5 HSS</text>
  <line x1="410" y1="180" x2="410" y2="233" stroke="rgba(59,130,246,0.2)" stroke-width="1" stroke-dasharray="4 3"/>
  <!-- Section labels -->
  <text x="90" y="210" font-family="monospace" font-size="8" fill="rgba(255,255,255,0.2)" text-anchor="middle" letter-spacing="1">DRIVE</text>
  <text x="260" y="212" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.2)" text-anchor="middle" letter-spacing="1">SHANK</text>
  <text x="572" y="215" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.2)" text-anchor="middle" letter-spacing="1">CUTTING · SPIRAL FLUTE</text>
  <!-- Hardness note -->
  <text x="730" y="360" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.18)" text-anchor="end">MATERIAL · M35 Co5 HIGH-SPEED STEEL</text>
  <text x="730" y="375" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.18)" text-anchor="end">HARDNESS · 64–66 HRC</text>
  <text x="730" y="390" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.18)" text-anchor="end">COATING · TiN / BRIGHT · TOLERANCE · H7</text>
  <!-- Origin mark -->
  <line x1="55" y1="55" x2="82" y2="55" stroke="rgba(59,130,246,0.3)" stroke-width="1"/>
  <line x1="55" y1="55" x2="55" y2="82" stroke="rgba(59,130,246,0.3)" stroke-width="1"/>
  <circle cx="55" cy="55" r="2" fill="#3b82f6" opacity="0.4"/>
  <!-- Product code watermark -->
  <text x="730" y="460" font-family="monospace" font-size="20" fill="rgba(59,130,246,0.4)" text-anchor="end" font-weight="bold" letter-spacing="2">HSR-MCH</text>
</svg>

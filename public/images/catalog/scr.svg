<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" fill="none">
  <rect width="800" height="500" fill="#0a0a0a"/>
  <line x1="0" y1="125" x2="800" y2="125" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="250" x2="800" y2="250" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="375" x2="800" y2="375" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="200" y1="0" x2="200" y2="500" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="500" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="500" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <!-- Center axis -->
  <line x1="55" y1="250" x2="745" y2="250" stroke="rgba(255,255,255,0.06)" stroke-width="1" stroke-dasharray="8 4"/>
  <!-- Shank -->
  <rect x="65" y="224" width="320" height="52" fill="#161616" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <!-- Shoulder -->
  <path d="M 385 224 L 420 224 L 420 276 L 385 276 Z" fill="#161616" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <!-- Cutting section -->
  <path d="M 420 227 L 705 230 L 722 250 L 705 270 L 420 273 Z" fill="#1a1a1a" stroke="rgba(255,255,255,0.14)" stroke-width="1"/>
  <!-- Right-hand helix flute lines -->
  <line x1="440" y1="227" x2="462" y2="273" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <line x1="474" y1="227" x2="496" y2="273" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <line x1="508" y1="227" x2="530" y2="273" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <line x1="542" y1="228" x2="564" y2="272" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <line x1="576" y1="228" x2="598" y2="272" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <line x1="610" y1="229" x2="630" y2="271" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <line x1="642" y1="229" x2="660" y2="270" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <line x1="672" y1="230" x2="688" y2="268" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <!-- Coolant through hole markers on shank -->
  <circle cx="220" cy="250" r="5" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <circle cx="220" cy="250" r="1.5" fill="rgba(255,255,255,0.07)"/>
  <!-- Diameter dimension -->
  <line x1="200" y1="204" x2="200" y2="224" stroke="#f97316" stroke-width="1"/>
  <line x1="200" y1="276" x2="200" y2="296" stroke="#f97316" stroke-width="1"/>
  <line x1="200" y1="207" x2="200" y2="293" stroke="#f97316" stroke-width="1"/>
  <polygon points="197,225 200,213 203,225" fill="#f97316"/>
  <polygon points="197,275 200,287 203,275" fill="#f97316"/>
  <text x="160" y="254" font-family="monospace" font-size="11" fill="#f97316" text-anchor="middle">Ø 12.000</text>
  <!-- Tolerance callout -->
  <rect x="292" y="136" width="200" height="44" rx="2" fill="#0a0a0a" stroke="rgba(249,115,22,0.25)" stroke-width="1"/>
  <text x="392" y="153" font-family="monospace" font-size="10" fill="rgba(249,115,22,0.7)" text-anchor="middle">TOLERANCE</text>
  <text x="392" y="171" font-family="monospace" font-size="14" fill="#f97316" text-anchor="middle" font-weight="bold">±0.002 mm</text>
  <line x1="392" y1="180" x2="392" y2="227" stroke="rgba(249,115,22,0.2)" stroke-width="1" stroke-dasharray="4 3"/>
  <!-- Section labels -->
  <text x="225" y="210" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.2)" text-anchor="middle" letter-spacing="1">SHANK · h6</text>
  <text x="565" y="210" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.2)" text-anchor="middle" letter-spacing="1">CUTTING SECTION · 4-FLUTE RH HELIX</text>
  <!-- Material notes -->
  <text x="730" y="360" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.18)" text-anchor="end">MATERIAL · K10 MICRO-GRAIN CARBIDE</text>
  <text x="730" y="375" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.18)" text-anchor="end">COATING · TiAlN / UNCOATED</text>
  <text x="730" y="390" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.18)" text-anchor="end">SHANK TOL · h6 · COOLANT-THROUGH FROM Ø6</text>
  <!-- Origin mark -->
  <line x1="55" y1="55" x2="82" y2="55" stroke="rgba(249,115,22,0.3)" stroke-width="1"/>
  <line x1="55" y1="55" x2="55" y2="82" stroke="rgba(249,115,22,0.3)" stroke-width="1"/>
  <circle cx="55" cy="55" r="2" fill="#f97316" opacity="0.4"/>
  <!-- Product code watermark -->
  <text x="730" y="460" font-family="monospace" font-size="20" fill="rgba(249,115,22,0.4)" text-anchor="end" font-weight="bold" letter-spacing="2">SCR-H7</text>
</svg>
